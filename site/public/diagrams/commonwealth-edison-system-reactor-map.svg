<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Commonwealth Edison system reactor map</title>
  <desc id="desc">Modern reading aid showing Steinmetz's report structure: station sections, power-limiting reactors, tie cables, and the recommended ring connection.</desc>
  <rect width="1100" height="520" fill="#fbfaf6"/>
  <g stroke="#d8d1c0" stroke-width="1">
    <path d="M70 130H1030"/>
    <path d="M70 330H1030"/>
    <path d="M130 70V450"/>
    <path d="M970 70V450"/>
  </g>
  <g font-family="Georgia, serif" fill="#141c1d">
    <text x="70" y="54" font-size="30" font-weight="700">Report Reading Aid: Station Sections and Reactors</text>
    <text x="70" y="83" font-size="16">Modern reconstruction from the 1919 report structure. Use the scan before canonical diagram claims.</text>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M220 250H430" stroke="#2f6f67" stroke-width="12"/>
    <path d="M500 250H710" stroke="#2f6f67" stroke-width="12"/>
    <path d="M780 250H920" stroke="#7f8b8c" stroke-width="8" stroke-dasharray="16 14"/>
    <path d="M220 170C350 85 785 85 920 170" fill="none" stroke="#a9822a" stroke-width="8" stroke-dasharray="14 12"/>
  </g>

  <g>
    <rect x="95" y="192" width="170" height="116" rx="8" fill="#e8f0ed" stroke="#2f6f67" stroke-width="3"/>
    <rect x="370" y="192" width="170" height="116" rx="8" fill="#f5ead6" stroke="#a9822a" stroke-width="3"/>
    <rect x="645" y="192" width="170" height="116" rx="8" fill="#efe6f7" stroke="#704798" stroke-width="3"/>
    <rect x="865" y="192" width="170" height="116" rx="8" fill="#e8edf4" stroke="#49677c" stroke-width="3"/>
  </g>

  <g font-family="Georgia, serif" fill="#141c1d" text-anchor="middle">
    <text x="180" y="237" font-size="25" font-weight="700">Fisk A</text>
    <text x="180" y="268" font-size="16">end of chain</text>
    <text x="455" y="237" font-size="25" font-weight="700">Quarry</text>
    <text x="455" y="268" font-size="16">middle section</text>
    <text x="730" y="237" font-size="25" font-weight="700">Fisk B</text>
    <text x="730" y="268" font-size="16">fault region in record</text>
    <text x="950" y="237" font-size="25" font-weight="700">Northwest</text>
    <text x="950" y="268" font-size="16">closely tied section</text>
  </g>

  <g font-family="Georgia, serif" fill="#141c1d" text-anchor="middle">
    <rect x="290" y="215" width="95" height="70" rx="5" fill="#fff7df" stroke="#a9822a" stroke-width="2"/>
    <text x="337" y="245" font-size="17" font-weight="700">reactor</text>
    <text x="337" y="268" font-size="15">1.75 ohms</text>
    <rect x="565" y="215" width="95" height="70" rx="5" fill="#fff7df" stroke="#a9822a" stroke-width="2"/>
    <text x="612" y="245" font-size="17" font-weight="700">reactor</text>
    <text x="612" y="268" font-size="15">1.75 ohms</text>
    <text x="852" y="352" font-size="18" fill="#4f554f">six tie cables: low reactance path in the record</text>
    <text x="562" y="118" font-size="18" fill="#8a6722">recommended additional reactor / ring relation for better separation</text>
  </g>

  <g font-family="Georgia, serif" fill="#141c1d">
    <rect x="90" y="382" width="920" height="76" rx="7" fill="#fffaf0" stroke="#d8c48b" stroke-width="2"/>
    <text x="116" y="416" font-size="19" font-weight="700">Engineering point</text>
    <text x="116" y="444" font-size="17">Power-limiting reactance reduces local trouble propagation, but it also changes synchronizing power between station sections.</text>
  </g>
</svg>

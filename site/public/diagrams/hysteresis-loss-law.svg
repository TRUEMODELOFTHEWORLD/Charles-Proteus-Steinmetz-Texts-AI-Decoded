<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hysteresis Loss Law</title>
  <desc id="desc">Modern reading aid for the Steinmetz law and magnetic energy loss per cycle.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .panel { fill: #f1ecdf; stroke: #263231; stroke-width: 2; }
    .ink { fill: #1d2727; font-family: Georgia, 'Times New Roman', serif; }
    .small { font-size: 24px; }
    .label { font-size: 30px; font-weight: 700; }
    .title { font-size: 42px; font-weight: 700; }
    .muted { fill: #596661; }
    .gold { stroke: #c69b39; fill: none; }
    .green { stroke: #2f6d63; fill: none; }
    .plum { stroke: #6c4d85; fill: none; }
    .red { stroke: #a24b3d; fill: none; }
    .bluefill { fill: #dbe8ef; stroke: #456a78; }
    .goldfill { fill: #f2dfad; stroke: #9b7728; }
    .greenfill { fill: #d9e8df; stroke: #2f6d63; }
    .plumfill { fill: #e7dcef; stroke: #6c4d85; }
    .line { stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .thin { stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect class="bg" width="1200" height="720"/>
  <text class="ink title" x="56" y="64">Hysteresis Loss Law</text>
  <text class="ink small muted" x="56" y="104">Modern reading aid for the Steinmetz law and magnetic energy loss per cycle.</text>
  
  <line x1="190" y1="560" x2="560" y2="560" class="thin muted" stroke="#596661"/>
  <line x1="375" y1="650" x2="375" y2="185" class="thin muted" stroke="#596661"/>
  <path d="M240 520 C160 365 245 215 380 240 C545 270 570 500 420 520 C330 532 292 505 240 520 Z" fill="#e7dcef" stroke="#6c4d85" stroke-width="5"/>
  <text class="ink label" x="575" y="305">area = energy lost</text>
  <text class="ink label" x="585" y="365">per magnetic cycle</text>
  <rect x="640" y="420" width="430" height="110" rx="8" class="goldfill"/>
  <text class="ink label" x="675" y="490">P_h proportional to f B^1.6</text>
  <text class="ink small muted" x="210" y="690">Scan verification still required for exact constants and unit conventions.</text>

</svg>

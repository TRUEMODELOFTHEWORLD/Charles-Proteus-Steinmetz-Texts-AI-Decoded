<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Number Plane</title>
  <desc id="desc">Modern reading aid for number, direction, and symbolic calculation in Engineering Mathematics.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .panel { fill: #f1ecdf; stroke: #263231; stroke-width: 2; }
    .ink { fill: #1d2727; font-family: Georgia, 'Times New Roman', serif; }
    .small { font-size: 24px; }
    .label { font-size: 30px; font-weight: 700; }
    .title { font-size: 42px; font-weight: 700; }
    .muted { fill: #596661; }
    .gold { stroke: #c69b39; fill: none; }
    .green { stroke: #2f6d63; fill: none; }
    .plum { stroke: #6c4d85; fill: none; }
    .red { stroke: #a24b3d; fill: none; }
    .bluefill { fill: #dbe8ef; stroke: #456a78; }
    .goldfill { fill: #f2dfad; stroke: #9b7728; }
    .greenfill { fill: #d9e8df; stroke: #2f6d63; }
    .plumfill { fill: #e7dcef; stroke: #6c4d85; }
    .line { stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .thin { stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect class="bg" width="1200" height="720"/>
  <text class="ink title" x="56" y="64">Engineering Number Plane</text>
  <text class="ink small muted" x="56" y="104">Modern reading aid for number, direction, and symbolic calculation in Engineering Mathematics.</text>
  
  <line x1="170" y1="360" x2="1030" y2="360" class="thin muted" stroke="#596661"/>
  <line x1="600" y1="620" x2="600" y2="140" class="thin muted" stroke="#596661"/>
  <path d="M600 360 L860 230" class="green line"/>
  <path d="M600 360 L860 360" class="gold line"/>
  <path d="M860 360 L860 230" class="plum line"/>
  <text class="ink label" x="885" y="236">a + jb</text>
  <text class="ink label" x="805" y="410">real</text>
  <text class="ink label" x="880" y="305">imaginary</text>
  <text class="ink label" x="175" y="345">negative</text>
  <text class="ink label" x="880" y="345">positive</text>
  <text class="ink small muted" x="255" y="665">Steinmetz treats number as directed quantity before it becomes AC operator language.</text>

</svg>

name: Diagram review
description: Verify, crop, annotate, or redraw a Steinmetz figure or diagram.
title: "[Diagram review]: "
labels: ["diagram-review", "needs-review"]
body:
  - type: input
    id: figure_id
    attributes:
      label: Figure ID
      description: Use an existing figure/crop ID or propose one.
    validations:
      required: true
  - type: input
    id: source_location
    attributes:
      label: Source location
      description: Source title, edition, printed page, PDF page, figure number.
    validations:
      required: true
  - type: textarea
    id: caption
    attributes:
      label: Caption or OCR figure text
      description: Paste the caption or surrounding text if available.
    validations:
      required: false
  - type: textarea
    id: crop_notes
    attributes:
      label: Crop or redraw notes
      description: Include crop box, page render, checksum, annotation ideas, or redraw status.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Review checklist
      options:
        - label: Original crop exists or is requested.
        - label: Source page and figure number are recorded.
        - label: Caption has been checked against scan.
        - label: Modern redraw is labeled as reconstruction.
        - label: Linked concepts/equations are identified.

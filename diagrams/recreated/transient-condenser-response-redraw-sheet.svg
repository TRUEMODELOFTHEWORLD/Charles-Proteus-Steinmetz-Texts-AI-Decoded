<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Transient condenser response redraw sheet</title>
  <desc id="desc">Modern vector reading aid for Steinmetz's condenser charge and discharge figures, showing logarithmic, critical, oscillatory, and decrement behavior.</desc>
  <rect width="1200" height="720" fill="#f7f4ed"/>
  <text x="44" y="56" font-family="Georgia, serif" font-size="32" fill="#1c2422">Condenser Charge, Oscillation, And Decrement</text>
  <text x="44" y="88" font-family="Arial, sans-serif" font-size="15" fill="#526064">Modern redraw sheet keyed to Steinmetz Figs. 11-15. Reading aid only; consult original scan crops for documentary evidence.</text>

  <g transform="translate(54 126)">
    <rect x="0" y="0" width="338" height="236" rx="4" fill="#fcfbf8" stroke="#d8d0c2"/>
    <text x="22" y="34" font-family="Georgia, serif" font-size="21" fill="#1c2422">Fig. 11 Reading</text>
    <text x="22" y="58" font-family="Arial, sans-serif" font-size="13" fill="#526064">High resistance: logarithmic, non-oscillatory charge.</text>
    <line x1="46" y1="188" x2="300" y2="188" stroke="#26312e" stroke-width="2"/>
    <line x1="66" y1="198" x2="66" y2="86" stroke="#26312e" stroke-width="2"/>
    <line x1="66" y1="96" x2="300" y2="96" stroke="#d8d0c2" stroke-width="2" stroke-dasharray="7 7"/>
    <path d="M66 188 C98 148 132 124 176 112 C216 101 252 98 300 96" fill="none" stroke="#2f6f67" stroke-width="5" stroke-linecap="round"/>
    <text x="216" y="122" font-family="Arial, sans-serif" font-size="14" fill="#2f6f67">approaches final charge</text>
  </g>

  <g transform="translate(431 126)">
    <rect x="0" y="0" width="338" height="236" rx="4" fill="#fcfbf8" stroke="#d8d0c2"/>
    <text x="22" y="34" font-family="Georgia, serif" font-size="21" fill="#1c2422">Fig. 12 Reading</text>
    <text x="22" y="58" font-family="Arial, sans-serif" font-size="13" fill="#526064">Critical resistance: boundary between oscillation and no oscillation.</text>
    <line x1="46" y1="188" x2="300" y2="188" stroke="#26312e" stroke-width="2"/>
    <line x1="66" y1="198" x2="66" y2="86" stroke="#26312e" stroke-width="2"/>
    <line x1="66" y1="96" x2="300" y2="96" stroke="#d8d0c2" stroke-width="2" stroke-dasharray="7 7"/>
    <path d="M66 188 C92 136 130 107 178 99 C220 92 258 95 300 96" fill="none" stroke="#a9822a" stroke-width="5" stroke-linecap="round"/>
    <text x="192" y="122" font-family="Arial, sans-serif" font-size="14" fill="#a9822a">fastest non-oscillatory case</text>
  </g>

  <g transform="translate(808 126)">
    <rect x="0" y="0" width="338" height="236" rx="4" fill="#fcfbf8" stroke="#d8d0c2"/>
    <text x="22" y="34" font-family="Georgia, serif" font-size="21" fill="#1c2422">Figs. 13-14 Reading</text>
    <text x="22" y="58" font-family="Arial, sans-serif" font-size="13" fill="#526064">Low resistance: oscillatory charge with decaying half waves.</text>
    <line x1="46" y1="142" x2="300" y2="142" stroke="#26312e" stroke-width="2"/>
    <line x1="66" y1="198" x2="66" y2="86" stroke="#26312e" stroke-width="2"/>
    <path d="M66 142 C86 74 108 214 130 142 C152 88 174 190 196 142 C218 105 240 170 262 142 C276 129 288 151 300 142" fill="none" stroke="#6b5896" stroke-width="5" stroke-linecap="round"/>
    <path d="M66 78 C110 98 158 116 206 126 C246 135 276 139 300 141" fill="none" stroke="#9b4d32" stroke-width="2" stroke-dasharray="7 7"/>
    <path d="M66 206 C110 186 158 168 206 158 C246 149 276 145 300 143" fill="none" stroke="#9b4d32" stroke-width="2" stroke-dasharray="7 7"/>
    <text x="190" y="91" font-family="Arial, sans-serif" font-size="14" fill="#6b5896">decaying oscillation</text>
  </g>

  <g transform="translate(54 414)">
    <rect x="0" y="0" width="526" height="216" rx="4" fill="#fcfbf8" stroke="#d8d0c2"/>
    <text x="22" y="36" font-family="Georgia, serif" font-size="22" fill="#1c2422">Fig. 15 Reading</text>
    <text x="22" y="62" font-family="Arial, sans-serif" font-size="13" fill="#526064">Decrement increases as the actual resistance approaches the critical resistance.</text>
    <line x1="66" y1="174" x2="470" y2="174" stroke="#26312e" stroke-width="2"/>
    <line x1="66" y1="174" x2="66" y2="84" stroke="#26312e" stroke-width="2"/>
    <path d="M66 168 C132 166 200 160 272 143 C344 125 408 102 470 90" fill="none" stroke="#2f6f67" stroke-width="5" stroke-linecap="round"/>
    <text x="434" y="196" font-family="Arial, sans-serif" font-size="13" fill="#26312e">r / r1</text>
    <text x="22" y="90" font-family="Arial, sans-serif" font-size="13" fill="#26312e">decrement</text>
    <text x="290" y="119" font-family="Arial, sans-serif" font-size="14" fill="#2f6f67">larger loss per half wave</text>
  </g>

  <g transform="translate(620 414)">
    <rect x="0" y="0" width="526" height="216" rx="4" fill="#fcfbf8" stroke="#d8d0c2"/>
    <text x="22" y="36" font-family="Georgia, serif" font-size="22" fill="#1c2422">Equation Bridge</text>
    <text x="22" y="68" font-family="Arial, sans-serif" font-size="16" fill="#1c2422">r1^2 = 4L / C</text>
    <text x="22" y="100" font-family="Arial, sans-serif" font-size="16" fill="#1c2422">f = 1/(2pi) sqrt(1/(LC) - (r/(2L))^2)</text>
    <text x="22" y="134" font-family="Arial, sans-serif" font-size="14" fill="#526064">Source frame: resistance, inductance, capacity, condenser charge, decrement.</text>
    <text x="22" y="160" font-family="Arial, sans-serif" font-size="14" fill="#526064">Modern frame: series RLC damping, natural frequency, damping ratio.</text>
    <text x="22" y="186" font-family="Arial, sans-serif" font-size="14" fill="#526064">Interpretive boundary: field-energy exchange may be discussed separately, but the equations are the anchor.</text>
  </g>

  <rect x="44" y="660" width="1102" height="36" rx="4" fill="#efe8d7" stroke="#d5c28e"/>
  <text x="62" y="683" font-family="Arial, sans-serif" font-size="14" fill="#463d28">Evidence boundary: original Steinmetz crops are source artifacts. This redraw is a mathematical reading aid and should stay paired with citations and scan verification.</text>
</svg>

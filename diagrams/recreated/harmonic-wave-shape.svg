<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Equivalent Sine Waves And Harmonics</title>
  <desc id="desc">Modern reading aid for wave-shape analysis and higher harmonics.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .panel { fill: #f1ecdf; stroke: #263231; stroke-width: 2; }
    .ink { fill: #1d2727; font-family: Georgia, 'Times New Roman', serif; }
    .small { font-size: 24px; }
    .label { font-size: 30px; font-weight: 700; }
    .title { font-size: 42px; font-weight: 700; }
    .muted { fill: #596661; }
    .gold { stroke: #c69b39; fill: none; }
    .green { stroke: #2f6d63; fill: none; }
    .plum { stroke: #6c4d85; fill: none; }
    .red { stroke: #a24b3d; fill: none; }
    .bluefill { fill: #dbe8ef; stroke: #456a78; }
    .goldfill { fill: #f2dfad; stroke: #9b7728; }
    .greenfill { fill: #d9e8df; stroke: #2f6d63; }
    .plumfill { fill: #e7dcef; stroke: #6c4d85; }
    .line { stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .thin { stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect class="bg" width="1200" height="720"/>
  <text class="ink title" x="56" y="64">Equivalent Sine Waves And Harmonics</text>
  <text class="ink small muted" x="56" y="104">Modern reading aid for wave-shape analysis and higher harmonics.</text>
  
  <path d="M95 360 C170 230 245 230 320 360 S470 490 545 360 S695 230 770 360 S920 490 1095 360" class="green line"/>
  <path d="M95 360 C122 255 150 255 177 360 S232 465 260 360 S315 255 342 360 S397 465 425 360 S480 255 507 360 S562 465 590 360 S645 255 672 360 S727 465 755 360 S810 255 837 360 S892 465 920 360 S1030 465 1095 360" class="plum thin"/>
  <path d="M95 360 C160 190 235 280 320 360 S470 520 545 360 S690 190 770 360 S930 520 1095 360" class="red line"/>
  <text class="ink label" x="105" y="170">fundamental</text>
  <text class="ink label" x="105" y="220">third harmonic</text>
  <text class="ink label" x="105" y="270">resultant wave</text>
  <line x1="370" y1="160" x2="450" y2="160" class="green line"/>
  <line x1="370" y1="210" x2="450" y2="210" class="plum thin"/>
  <line x1="370" y1="260" x2="450" y2="260" class="red line"/>

</svg>

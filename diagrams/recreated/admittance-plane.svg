<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Admittance Plane</title>
  <desc id="desc">Modern reading aid for conductance, susceptance, and reciprocal impedance.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .panel { fill: #f1ecdf; stroke: #263231; stroke-width: 2; }
    .ink { fill: #1d2727; font-family: Georgia, 'Times New Roman', serif; }
    .small { font-size: 24px; }
    .label { font-size: 30px; font-weight: 700; }
    .title { font-size: 42px; font-weight: 700; }
    .muted { fill: #596661; }
    .gold { stroke: #c69b39; fill: none; }
    .green { stroke: #2f6d63; fill: none; }
    .plum { stroke: #6c4d85; fill: none; }
    .red { stroke: #a24b3d; fill: none; }
    .bluefill { fill: #dbe8ef; stroke: #456a78; }
    .goldfill { fill: #f2dfad; stroke: #9b7728; }
    .greenfill { fill: #d9e8df; stroke: #2f6d63; }
    .plumfill { fill: #e7dcef; stroke: #6c4d85; }
    .line { stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .thin { stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect class="bg" width="1200" height="720"/>
  <text class="ink title" x="56" y="64">Admittance Plane</text>
  <text class="ink small muted" x="56" y="104">Modern reading aid for conductance, susceptance, and reciprocal impedance.</text>
  
  <line x1="200" y1="560" x2="980" y2="560" class="thin muted" stroke="#596661"/>
  <line x1="260" y1="620" x2="260" y2="160" class="thin muted" stroke="#596661"/>
  <path d="M260 560 L790 310" class="green line"/>
  <path d="M260 560 L790 560" class="gold line"/>
  <path d="M790 560 L790 310" class="plum line"/>
  <path d="M350 560 A110 110 0 0 0 330 510" class="red thin"/>
  <text class="ink label" x="820" y="316">Y = g - jb</text>
  <text class="ink label" x="530" y="600">conductance g</text>
  <text class="ink label" x="815" y="450">susceptance b</text>
  <text class="ink small muted" x="320" y="700">Admittance is the reciprocal view: current response per applied voltage.</text>

</svg>

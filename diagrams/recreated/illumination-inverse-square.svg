<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Illumination and distance guide</title>
  <desc id="desc">Recreated guide showing light flux spreading from a source and decreasing with distance.</desc>
  <rect width="900" height="360" fill="#fbfaf6"/>
  <circle cx="170" cy="180" r="28" fill="#d4b15c" stroke="#8b6b23" stroke-width="4"/>
  <g fill="none" stroke="#d4b15c" stroke-width="3" opacity="0.55">
    <circle cx="170" cy="180" r="72"/>
    <circle cx="170" cy="180" r="132"/>
    <circle cx="170" cy="180" r="200"/>
  </g>
  <g stroke="#9b4d32" stroke-width="3" stroke-linecap="round">
    <path d="M170 180L745 80"/>
    <path d="M170 180L745 180"/>
    <path d="M170 180L745 280"/>
  </g>
  <g fill="#f6f2e8" stroke="#4f554f" stroke-width="3">
    <rect x="735" y="54" width="36" height="252"/>
    <rect x="482" y="101" width="28" height="158"/>
  </g>
  <g font-family="Georgia, serif" fill="#151b1c">
    <text x="58" y="42" font-size="30" font-weight="700">Light Flux and Illumination</text>
    <text x="58" y="76" font-size="16">Recreated guide for reading Steinmetz's illumination chapters.</text>
    <text x="456" y="292" font-size="23">near surface</text>
    <text x="690" y="326" font-size="23">far surface</text>
    <text x="515" y="150" font-size="28">illumination falls as area grows</text>
    <text x="515" y="188" font-size="24">E proportional to I / d^2</text>
  </g>
</svg>
